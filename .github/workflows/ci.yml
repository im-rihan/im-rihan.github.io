name: CI

# Gate for pull requests only — lint, type-check, tests, build, bundle budget, e2e, Lighthouse.
# Main deploys via deploy-gh-pages.yml on merge (no second CI run on push to main).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Generate brand assets
        run: npm run generate:brand

      - name: Generate resume binaries
        run: |
          pip install -r resume/requirements.txt
          python -m playwright install chromium
          npm run generate:resume

      - name: Build static export
        run: npm run build

      - name: Check homepage bundle size budget
        run: npm run check:bundle-size

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox webkit

      - name: E2E smoke tests
        run: npm run test:e2e

  lighthouse:
    runs-on: ubuntu-latest
    # Independent job so a Lighthouse hiccup (e.g. a transient Chrome crash) never
    # blocks the core lint/type-check/test/build gate above from reporting status.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate brand assets
        run: npm run generate:brand

      - name: Build static export
        run: npm run build

      - name: Run Lighthouse CI
        run: npm run lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  lighthouse-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate brand assets
        run: npm run generate:brand

      - name: Build static export
        run: npm run build

      - name: Run Lighthouse CI (mobile)
        run: npm run lighthouse:mobile
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
